services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: frx
      POSTGRES_PASSWORD: frx_dev
      POSTGRES_DB: frx_arcade
    ports:
      # Host 5433 avoids conflict with a local Postgres on 5432
      - "5433:5432"
    volumes:
      - frx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frx -d frx_arcade"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - frx_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  frx_pg_data:
  frx_redis_data:
